name: Push reminders

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: push-reminders
  cancel-in-progress: false

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Chamar endpoint de lembretes
        run: |
          curl --fail --show-error --silent \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            https://lestebarbearia.agenciajn.com.br/api/cron/push-reminders